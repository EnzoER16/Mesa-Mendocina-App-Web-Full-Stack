{% extends 'base.html' %}
{% block title %}Crear Cuenta{% endblock %}
{% block content %}
<h2>Crear Cuenta</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Nombre" required class="form-control mb-2">
    <input type="email" name="email" placeholder="Email" required class="form-control mb-2">
    <input type="password" name="password" placeholder="Contraseña" required class="form-control mb-2">
    <button type="submit" class="btn btn-success">Crear Cuenta</button>
</form>
{% if error %}
<div class="alert alert-danger mt-2">{{ error }}</div>
{% endif %}
{% endblock %}
