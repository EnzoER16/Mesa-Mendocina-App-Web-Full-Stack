<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4">
            <div class="modal-header">
                <h5 class="modal-title">Iniciar Sesión / Crear Cuenta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Login Form -->
                <form action="{{ url_for('login_view') }}" method="POST">
                    <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                    <input type="password" name="password" placeholder="Contraseña" class="form-control mb-2" required>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </form>
                <hr>
                <!-- Register Form -->
                <form action="{{ url_for('register_view') }}" method="POST">
                    <input type="text" name="username" placeholder="Nombre" class="form-control mb-2" required>
                    <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                    <input type="password" name="password" placeholder="Contraseña" class="form-control mb-2" required>
                    <button type="submit" class="btn btn-success w-100">Crear Cuenta</button>
                </form>
            </div>
        </div>
    </div>
</div>
